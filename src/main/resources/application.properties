# Let Railway inject the dynamic database credentials automatically
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/blackframe}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:your_local_password}
spring.jpa.hibernate.ddl-auto=update

# Let Railway inject the port, default to 8080 locally
server.port=${PORT:8080}

# The new Linux cloud path for your videos (works locally too)
video.storage.location=/app/data/videos/

# Allow larger file uploads (e.g., up to 500MB per video)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB